<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de dias de estudo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📊 Contagem de Estudos</h1>

        <p class="descricao">
            Registre seus dias de estudo e acompanhe sua consistência.
        </p>

        <p id="quantidadeDias"></p>

        <div class="botoes">
            <button onclick="cliqueDoBotao()">Adicionar dia</button>
            <button onclick="limparDados()">Limpar dados</button>
        </div>

        <h2>📅 Histórico</h2>

        <ul id="lista"></ul>

    </div>

    <script src="script.js"></script>
</body>
</html>
